services:
  # ── FastAPI Backend ──────────────────────────────────────────
  - type: web
    name: leadflow-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false        # Set in Render dashboard (Supabase URL)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false        # Set a strong random secret in dashboard
      - key: BRIDGE_SECRET
        sync: false        # Same value as in WhatsApp bridge service
      - key: WHATSAPP_OWNER_USER_ID
        value: "1"         # User ID that receives WhatsApp inbound leads
      - key: WA_MANAGER_PHONE
        value: "917087603933"
      # ── Meta WhatsApp Cloud API ──────────────────────────────────
      - key: WA_PHONE_NUMBER_ID
        sync: false        # e.g. 1117785374756659 — from Meta Developer Console
      - key: WA_ACCESS_TOKEN
        sync: false        # Permanent token from Meta Developer Console
      - key: WA_WEBHOOK_VERIFY_TOKEN
        value: "leadflow-webhook-verify-2024"

  # ── WhatsApp Bridge ──────────────────────────────────────────
  - type: web
    name: leadflow-whatsapp
    runtime: docker
    dockerfilePath: ./Dockerfile.whatsapp
    healthCheckPath: /health
    envVars:
      - key: FASTAPI_URL
        sync: false        # Set to FastAPI backend URL after first deploy
      - key: BRIDGE_SECRET
        sync: false        # Same value as in backend service
